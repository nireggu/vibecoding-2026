<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단한 TODO 리스트</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #ef4444;
      --border: #dbe3f0;
      --done: #9ca3af;
      --done-bg: #f3f4f6;
      --shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .add-btn {
      background: var(--primary);
      color: white;
      min-width: 92px;
    }

    .add-btn:hover {
      background: var(--primary-dark);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    .todo-text {
      flex: 1;
      word-break: break-word;
      line-height: 1.5;
    }

    .done .todo-text {
      text-decoration: line-through;
      color: var(--done);
    }

    .done {
      background: var(--done-bg);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .check-btn {
      background: #10b981;
      color: white;
    }

    .check-btn:hover {
      background: #059669;
    }

    .delete-btn {
      background: var(--danger);
      color: white;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #fafbff;
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }

      .input-area {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      li {
        flex-direction: column;
        align-items: stretch;
      }

      .actions {
        width: 100%;
      }

      .actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>TODO 리스트</h1>
    <p>할 일을 추가하고, 완료 체크하거나 삭제할 수 있어요. 데이터는 FastAPI 서버에 저장됩니다.</p>

    <div class="input-area">
      <input id="todoInput" type="text" placeholder="할 일을 입력하세요" />
      <button class="add-btn" id="addBtn">추가</button>
    </div>

    <ul id="todoList">
      <li class="empty" id="emptyMessage">아직 할 일이 없어요. 새 할 일을 추가해보세요!</li>
    </ul>
  </main>

  <script>
    // FastAPI 서버 주소
    const API_BASE_URL = "http://127.0.0.1:8000";

    // HTML 요소 가져오기
    const todoInput = document.getElementById("todoInput");
    const addBtn = document.getElementById("addBtn");
    const todoList = document.getElementById("todoList");
    const emptyMessage = document.getElementById("emptyMessage");

    // 목록이 비어 있을 때 보여줄 안내 문구
    function showEmptyMessage() {
      const message = document.createElement("li");
      message.className = "empty";
      message.id = "emptyMessage";
      message.textContent = "아직 할 일이 없어요. 새 할 일을 추가해보세요!";
      todoList.appendChild(message);
    }

    // 기존 목록을 모두 지우는 함수
    function clearTodoList() {
      todoList.innerHTML = "";
    }

    // TODO 한 개를 화면에 그리는 함수
    function renderTodo(todo) {
      const li = document.createElement("li");
      li.dataset.id = todo.id;

      if (todo.completed) {
        li.classList.add("done");
      }

      const span = document.createElement("span");
      span.className = "todo-text";
      span.textContent = todo.title;

      const actions = document.createElement("div");
      actions.className = "actions";

      const checkBtn = document.createElement("button");
      checkBtn.className = "check-btn";
      checkBtn.textContent = todo.completed ? "취소" : "완료";

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.textContent = "삭제";

      // 완료 버튼: API에 상태 변경 요청
      checkBtn.addEventListener("click", async function () {
        const nextCompleted = !todo.completed;

        try {
          const response = await fetch(`${API_BASE_URL}/todos/${todo.id}`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              completed: nextCompleted
            })
          });

          if (!response.ok) {
            throw new Error("완료 상태 변경 실패");
          }

          const updatedTodo = await response.json();
          todo.completed = updatedTodo.completed;
          li.classList.toggle("done", todo.completed);
          checkBtn.textContent = todo.completed ? "취소" : "완료";
        } catch (error) {
          alert("완료 상태를 변경하지 못했습니다.");
          console.error(error);
        }
      });

      // 삭제 버튼: API에 삭제 요청
      deleteBtn.addEventListener("click", async function () {
        try {
          const response = await fetch(`${API_BASE_URL}/todos/${todo.id}`, {
            method: "DELETE"
          });

          if (!response.ok && response.status !== 204) {
            throw new Error("삭제 실패");
          }

          li.remove();

          if (todoList.children.length === 0) {
            showEmptyMessage();
          }
        } catch (error) {
          alert("할 일을 삭제하지 못했습니다.");
          console.error(error);
        }
      });

      actions.appendChild(checkBtn);
      actions.appendChild(deleteBtn);
      li.appendChild(span);
      li.appendChild(actions);
      todoList.appendChild(li);
    }

    // API에서 목록을 가져오는 함수
    async function loadTodos() {
      try {
        const response = await fetch(`${API_BASE_URL}/todos`);

        if (!response.ok) {
          throw new Error("목록 조회 실패");
        }

        const todos = await response.json();
        clearTodoList();

        if (todos.length === 0) {
          showEmptyMessage();
          return;
        }

        todos.forEach(renderTodo);
      } catch (error) {
        clearTodoList();
        showEmptyMessage();
        alert("할 일 목록을 불러오지 못했습니다. FastAPI 서버가 실행 중인지 확인해 주세요.");
        console.error(error);
      }
    }

    // 할 일을 추가하는 함수
    async function addTodo() {
      const text = todoInput.value.trim();

      // 입력값이 없으면 아무것도 하지 않음
      if (text === "") {
        alert("할 일을 입력해 주세요.");
        todoInput.focus();
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/todos`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title: text
          })
        });

        if (!response.ok) {
          throw new Error("추가 실패");
        }

        const newTodo = await response.json();

        if (emptyMessage) {
          emptyMessage.remove();
        }

        renderTodo(newTodo);

        // 입력창 초기화
        todoInput.value = "";
        todoInput.focus();
      } catch (error) {
        alert("할 일을 추가하지 못했습니다. FastAPI 서버를 확인해 주세요.");
        console.error(error);
      }
    }

    // 추가 버튼 클릭 시 실행
    addBtn.addEventListener("click", addTodo);

    // Enter 키를 누르면 추가
    todoInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        addTodo();
      }
    });

    // 페이지가 열리면 목록을 한 번 불러오기
    loadTodos();
  </script>
</body>
</html>
